<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte - Recuperação de Solo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Agro Forte</h1>
    <p class="subtitle">Recupere o solo destruído usando a tecnologia ao seu favor!</p>

    <div id="game-container">
        <div id="player">🧑‍🌾</div>
        <div id="tractor">🚜 TRATOR</div>
    </div>

    <div class="controls">
        <p><strong>Controles:</strong> Use as setas do teclado (⬅️ ➡️ ⬆️ ⬇️) para movimentar o personagem.</p>
        <p id="status">Status: Vá até o trator para começar a restaurar o solo degradado!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
